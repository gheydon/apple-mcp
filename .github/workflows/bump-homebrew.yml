name: Bump Homebrew formula

# Updates Formula/apple-mcp.rb in gheydon/homebrew-apple-mcp whenever a
# release is published in this repo (or when manually dispatched). The
# workflow opens a PR against the tap; merge it to ship.
#
# One-time setup:
#   1. Create a fine-grained Personal Access Token scoped to the
#      gheydon/homebrew-apple-mcp repo with these permissions:
#        - Contents: Read and write
#        - Pull requests: Read and write
#   2. Add it as a repo secret here named HOMEBREW_TAP_TOKEN.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to sync (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      TAP_REPO: gheydon/homebrew-apple-mcp
      FORMULA_PATH: Formula/apple-mcp.rb
      MAIN_REPO: ${{ github.repository }}
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag=$TAG, Version=$VERSION"

      - name: Locate macOS tarball asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          EXPECTED="apple-mcp-${VERSION}-macos.tar.gz"
          URL=$(gh release view "$TAG" --repo "$MAIN_REPO" \
                  --json assets --jq ".assets[] | select(.name==\"$EXPECTED\") | .url")
          if [ -z "$URL" ]; then
            echo "::error::Could not find asset $EXPECTED on release $TAG"
            exit 1
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "filename=$EXPECTED" >> "$GITHUB_OUTPUT"
          echo "Found asset: $URL"

      - name: Download and hash tarball
        id: hash
        run: |
          curl -sSL -o tarball.tar.gz "${{ steps.asset.outputs.url }}"
          SHA=$(shasum -a 256 tarball.tar.gz | awk '{print $1}')
          SIZE=$(wc -c < tarball.tar.gz)
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tarball is $SIZE bytes, sha256=$SHA"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        id: edit
        working-directory: tap
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          SHA="${{ steps.hash.outputs.sha256 }}"
          FILE="$FORMULA_PATH"
          NEW_URL="https://github.com/${MAIN_REPO}/releases/download/${TAG}/apple-mcp-${VERSION}-macos.tar.gz"

          python3 - "$FILE" "$NEW_URL" "$SHA" "$VERSION" <<'PY'
          import re, sys, pathlib
          path, url, sha, version = sys.argv[1:5]
          p = pathlib.Path(path)
          text = p.read_text()
          text = re.sub(r'url "[^"]+"', f'url "{url}"', text, count=1)
          text = re.sub(r'sha256 "[^"]+"', f'sha256 "{sha}"', text, count=1)
          text = re.sub(r'version "[^"]+"', f'version "{version}"', text, count=1)
          p.write_text(text)
          PY

          echo "----- updated formula -----"
          head -10 "$FILE"

          if git diff --quiet -- "$FILE"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.edit.outputs.changed == 'true'
        working-directory: tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          TAG="${{ steps.tag.outputs.tag }}"
          BRANCH="bump-apple-mcp-${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$FORMULA_PATH"
          git commit -m "apple-mcp ${VERSION}"
          git push -u origin "$BRANCH" --force

          BODY=$(cat <<EOF
          Bumps \`apple-mcp\` to **${VERSION}**.

          - Source release: https://github.com/${MAIN_REPO}/releases/tag/${TAG}
          - Tarball: \`apple-mcp-${VERSION}-macos.tar.gz\`
          - sha256: \`${{ steps.hash.outputs.sha256 }}\`

          Generated by the [bump-homebrew](https://github.com/${MAIN_REPO}/actions) workflow.
          EOF
          )

          gh pr create \
            --repo "$TAP_REPO" \
            --base main \
            --head "$BRANCH" \
            --title "apple-mcp ${VERSION}" \
            --body "$BODY" \
            || gh pr edit "$BRANCH" --repo "$TAP_REPO" --body "$BODY"

      - name: No changes
        if: steps.edit.outputs.changed == 'false'
        run: echo "Formula is already at version ${{ steps.tag.outputs.version }} — nothing to do."
